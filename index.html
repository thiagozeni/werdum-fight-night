<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Werdum Fight</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #game-wrap {
        position: fixed;
        inset: 0;
      }
      #rotate-msg {
        display: none !important;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #000;
        color: #fff;
        font-size: 22px;
        font-family: monospace;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 16px;
      }
      @media (orientation: portrait) {
        #rotate-msg { display: flex !important; }
      }
    </style>
  </head>
  <body>
    <div id="game-wrap"></div>
    <div id="rotate-msg">
      <div style="font-size:48px">&#8635;</div>
      <p>Gire o dispositivo<br>para jogar</p>
    </div>
    <script>
      // Fullscreen no primeiro toque — tenta várias APIs
      function requestFS() {
        const el = document.documentElement
        try {
          if (el.requestFullscreen)            el.requestFullscreen({ navigationUI: 'hide' })
          else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen()
          else if (el.mozRequestFullScreen)    el.mozRequestFullScreen()
        } catch(e) {}
        // Tenta também ocultar a barra do navegador via scroll
        window.scrollTo(0, 1)
      }
      document.addEventListener('touchend', requestFS, { once: true })
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
