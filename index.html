<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="imgs/cachorradas-logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Werdum Fight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@700&display=block" rel="stylesheet">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7KB5KYGPBB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-7KB5KYGPBB');
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #game-wrap {
        position: fixed;
        inset: 0;
      }
      #rotate-msg {
        display: none !important;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #000;
        color: #fff;
        font-size: 22px;
        font-family: monospace;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 16px;
      }
      @media (orientation: portrait) {
        #rotate-msg { display: flex !important; }
      }
    </style>
  </head>
  <body>
    <div id="loader-overlay" style="
      position: fixed; inset: 0; z-index: 999;
      background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px;
      transition: opacity 0.5s ease;
    ">
      <video autoplay loop muted playsinline style="
        width: 66%; height: 66%; object-fit: contain;
      ">
        <source src="videos/loader.m4v" type="video/mp4">
      </video>
      <div style="width: 66%; display: flex; flex-direction: column; gap: 10px;">
        <div style="
          width: 100%; height: 10px;
          background: rgba(0, 180, 255, 0.12);
          border-radius: 10px;
          border: 1px solid rgba(0, 180, 255, 0.35);
          box-shadow: 0 0 10px rgba(0, 180, 255, 0.2);
          overflow: hidden;
        ">
          <div id="loader-bar" style="
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00aaff, #00eeff);
            border-radius: 10px;
            box-shadow: 0 0 12px #00ccff, 0 0 28px #0088ff;
            transition: width 0.15s ease;
          "></div>
        </div>
        <div id="loader-pct" style="
          text-align: right;
          font-family: monospace;
          font-size: 12px;
          color: rgba(0, 200, 255, 0.7);
          letter-spacing: 2px;
          text-shadow: 0 0 8px #00ccff;
        ">0%</div>
      </div>
    </div>
    <div id="game-wrap"></div>
    <div id="rotate-msg">
      <div style="font-size:48px">&#8635;</div>
      <p>Gire o dispositivo<br>para jogar</p>
    </div>
    <script>
      var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || navigator.maxTouchPoints > 1

      function requestFS() {
        if (!isMobile) return
        if (document.fullscreenElement || document.webkitFullscreenElement) return
        const el = document.documentElement
        try {
          if (el.requestFullscreen)            el.requestFullscreen({ navigationUI: 'hide' })
          else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen()
          else if (el.mozRequestFullScreen)    el.mozRequestFullScreen()
        } catch(e) {}
        window.scrollTo(0, 1)
      }

      if (isMobile) {
        ['touchstart', 'touchend', 'pointerdown', 'click'].forEach(ev =>
          document.addEventListener(ev, requestFS)
        )

        document.addEventListener('fullscreenchange', () => {
          if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            setTimeout(requestFS, 300)
          }
        })
        document.addEventListener('webkitfullscreenchange', () => {
          if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            setTimeout(requestFS, 300)
          }
        })
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
