<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="imgs/cachorradas-logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Werdum Fight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@700&display=block" rel="stylesheet">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7KB5KYGPBB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-7KB5KYGPBB');
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #game-wrap {
        position: fixed;
        inset: 0;
      }
      #rotate-msg {
        display: none !important;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #000;
        color: #fff;
        font-size: 22px;
        font-family: monospace;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 16px;
      }
      @media (orientation: portrait) {
        #rotate-msg { display: flex !important; }
      }
    </style>
  </head>
  <body>
    <div id="loader-overlay" style="
      position: fixed; inset: 0; z-index: 999;
      background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px;
      transition: opacity 0.5s ease;
    ">
      <video autoplay loop muted playsinline style="
        width: 60%; height: 60%; object-fit: contain;
      ">
        <source src="videos/loader.m4v" type="video/mp4">
      </video>

      <!-- Área fixa abaixo do vídeo — barra e botão ocupam o mesmo espaço -->
      <div style="width: 60%; height: 52px; position: relative; display: flex; align-items: center;">

        <!-- Barra de progresso -->
        <div id="loader-progress" style="position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px; justify-content: center;">
          <div style="
            width: 100%; height: 10px;
            background: rgba(0, 180, 255, 0.12);
            border-radius: 10px;
            border: 1px solid rgba(0, 180, 255, 0.35);
            box-shadow: 0 0 10px rgba(0, 180, 255, 0.2);
            overflow: hidden;
          ">
            <div id="loader-bar" style="
              width: 0%; height: 100%;
              background: linear-gradient(90deg, #00aaff, #00eeff);
              border-radius: 10px;
              box-shadow: 0 0 12px #00ccff, 0 0 28px #0088ff;
              transition: width 0.15s ease;
            "></div>
          </div>
          <div id="loader-pct" style="
            text-align: right; font-family: monospace; font-size: 12px;
            color: rgba(0, 200, 255, 0.7); letter-spacing: 2px;
            text-shadow: 0 0 8px #00ccff;
          ">0%</div>
        </div>

        <!-- Botão JOGAR — aparece após 100%, mesmo espaço -->
        <div id="loader-play" style="
          position: absolute; inset: 0;
          display: none; align-items: center; justify-content: center;
          cursor: pointer;
        ">
          <div style="
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(20px, 3.2vw, 40px);
            color: #00eeff;
            text-shadow: 0 0 16px #00ccff, 0 0 40px #0088ff, 0 0 80px #0055ff;
            letter-spacing: 6px;
            animation: neon-pulse 1.2s ease-in-out infinite alternate;
          ">JOGAR</div>
        </div>

      </div>
    </div>

    <style>
      @keyframes neon-pulse {
        from { text-shadow: 0 0 10px #00ccff, 0 0 30px #0088ff, 0 0 60px #0055ff; }
        to   { text-shadow: 0 0 20px #00eeff, 0 0 50px #00aaff, 0 0 100px #0077ff; }
      }
    </style>
    <div id="game-wrap"></div>
    <div id="rotate-msg">
      <div style="font-size:48px">&#8635;</div>
      <p>Gire o dispositivo<br>para jogar</p>
    </div>
    <script>
      // Chamado pelo BootScene quando o carregamento termina
      window.showPlayButton = function(onStart) {
        var progress = document.getElementById('loader-progress')
        var playBtn  = document.getElementById('loader-play')
        var overlay  = document.getElementById('loader-overlay')

        if (progress) progress.style.display = 'none'
        if (playBtn)  playBtn.style.display = 'flex'

        function start() {
          overlay.removeEventListener('click',      start)
          overlay.removeEventListener('touchstart', start)

          // Fullscreen apenas no mobile
          var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || navigator.maxTouchPoints > 1
          if (isMobile) {
            var el = document.documentElement
            var fsPromise = null
            try {
              if      (el.requestFullscreen)            fsPromise = el.requestFullscreen({ navigationUI: 'hide' })
              else if (el.webkitRequestFullscreen)      fsPromise = el.webkitRequestFullscreen()
              else if (el.mozRequestFullScreen)         fsPromise = el.mozRequestFullScreen()
            } catch(e) {}
            if (fsPromise && fsPromise.catch) fsPromise.catch(function() {})
            // Trava orientação em landscape (melhor suporte no Android Chrome)
            if (screen.orientation && screen.orientation.lock) {
              screen.orientation.lock('landscape').catch(function() {})
            }
          }

          overlay.style.opacity = '0'
          setTimeout(function() { overlay.remove(); onStart() }, 500)
        }

        overlay.addEventListener('click',      start)
        overlay.addEventListener('touchstart', start)
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
