  <body>
    <div id="loader-overlay" style="
      position: fixed; inset: 0; z-index: 999;
      background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px;
      transition: opacity 0.5s ease;
    ">
      <video autoplay loop muted playsinline style="
        width: 60%; height: 60%; object-fit: contain;
      ">
        <source src="videos/loader.m4v" type="video/mp4">
      </video>

      <!-- Área fixa abaixo do vídeo — barra e botão ocupam o mesmo espaço -->
      <div style="width: 60%; height: 52px; position: relative; display: flex; align-items: center;">

        <!-- Barra de progresso -->
        <div id="loader-progress" style="position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px; justify-content: center;">
          <div style="
            width: 100%; height: 10px;
            background: rgba(0, 180, 255, 0.12);
            border-radius: 10px;
            border: 1px solid rgba(0, 180, 255, 0.35);
            box-shadow: 0 0 10px rgba(0, 180, 255, 0.2);
            overflow: hidden;
          ">
            <div id="loader-bar" style="
              width: 0%; height: 100%;
              background: linear-gradient(90deg, #00aaff, #00eeff);
              border-radius: 10px;
              box-shadow: 0 0 12px #00ccff, 0 0 28px #0088ff;
              transition: width 0.15s ease;
            "></div>
          </div>
          <div id="loader-pct" style="
            text-align: right; font-family: monospace; font-size: 12px;
            color: rgba(0, 200, 255, 0.7); letter-spacing: 2px;
            text-shadow: 0 0 8px #00ccff;
          ">0%</div>
        </div>

        <!-- Botão JOGAR — aparece após 100%, mesmo espaço -->
        <div id="loader-play" style="
          position: absolute; inset: 0;
          display: none; align-items: center; justify-content: center;
          cursor: pointer;
        ">
          <div style="
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(20px, 3.2vw, 40px);
            color: #00eeff;
            text-shadow: 0 0 16px #00ccff, 0 0 40px #0088ff, 0 0 80px #0055ff;
            letter-spacing: 6px;
            animation: neon-pulse 1.2s ease-in-out infinite alternate;
          ">JOGAR</div>
        </div>

      </div>
    </div>

    <style>
      @keyframes neon-pulse {
        from { text-shadow: 0 0 10px #00ccff, 0 0 30px #0088ff, 0 0 60px #0055ff; }
        to   { text-shadow: 0 0 20px #00eeff, 0 0 50px #00aaff, 0 0 100px #0077ff; }
      }
    </style>
    <div id="game-wrap"></div>
    <div id="rotate-msg">
      <div style="font-size:48px">&#8635;</div>
      <p>Gire o dispositivo<br>para jogar</p>
    </div>
    <script>
      // Chamado pelo BootScene quando o carregamento termina
      window.showPlayButton = function(onStart) {
        var progress = document.getElementById('loader-progress')
        var playBtn  = document.getElementById('loader-play')
        var overlay  = document.getElementById('loader-overlay')

        if (progress) progress.style.display = 'none'
        if (playBtn)  playBtn.style.display = 'flex'

        // touch-action: manipulation elimina o delay de 300ms no click mobile
        overlay.style.touchAction = 'manipulation'

        function start() {
          overlay.removeEventListener('click', start)

          function proceed() {
            overlay.style.opacity = '0'
            setTimeout(function() {
              overlay.remove()
              onStart()
              if (typeof window.__showIOSBanner === 'function') {
                setTimeout(window.__showIOSBanner, 3000)
              }
            }, 500)
          }

          function lockOrientation() {
            if (screen.orientation && screen.orientation.lock) {
              screen.orientation.lock('landscape').catch(function() {})
            }
          }

          var isAndroid = /Android/i.test(navigator.userAgent)
          if (isAndroid) {
            try {
              var el = document.documentElement
              var fsPromise = el.requestFullscreen ? el.requestFullscreen()
                            : el.webkitRequestFullscreen ? el.webkitRequestFullscreen()
                            : null
              if (fsPromise && fsPromise.then) {
                fsPromise.then(lockOrientation).catch(function(){})
              }
            } catch(e) {}
          }
          proceed()
        }

        // Apenas 'click' — universalmente aceito pelo Android Chrome para requestFullscreen
        overlay.addEventListener('click', start)
      }
    </script>

    <!-- Banner iOS: aparece só no Safari (não standalone) -->
    <div id="ios-banner" style="
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10000;
      background: rgba(0,0,0,0.92);
      border-top: 1px solid rgba(255,255,255,0.15);
      padding: 14px 20px 20px;
      font-family: -apple-system, sans-serif;
      color: #fff;
      text-align: center;
    ">
      <div style="font-size:13px; line-height:1.6; margin-bottom:10px;">
        Para jogar em tela cheia, adicione à tela inicial:<br>
        toque em <strong>&#9633; Compartilhar</strong> → <strong>Adicionar à Tela de Início</strong>
      </div>
      <button onclick="document.getElementById('ios-banner').style.display='none'" style="
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 8px;
        color: #fff;
        font-size: 12px;
        padding: 6px 18px;
        cursor: pointer;
      ">Fechar</button>
    </div>
    <script>
      (function() {
        var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent)
        var isStandalone = window.navigator.standalone === true
        if (isIOS && !isStandalone) {
          // Mostra o banner só depois que o jogo iniciar (aguarda o overlay sumir)
          window.__showIOSBanner = function() {
            var banner = document.getElementById('ios-banner')
            if (banner) banner.style.display = 'block'
          }
        }
      })()
    </script>
